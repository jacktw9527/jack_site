services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      INTERNAL_BACKEND_BASE_URL: http://api:8000
      NEXT_PUBLIC_BACKEND_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - api

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://qr_user:qr_password@postgres:5432/qr_code
      REDIS_URL: redis://redis:6379/0
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qr_code
      POSTGRES_USER: qr_user
      POSTGRES_PASSWORD: qr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qr_user -d qr_code"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ngrok:
    image: ngrok/ngrok:latest
    profiles:
      - ngrok
    command: ["http", "api:8000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - api

volumes:
  frontend_node_modules:
    name: jack_site_frontend_node_modules
  frontend_next:
    name: jack_site_frontend_next
  postgres_data:
    name: jack_site_postgres_data
  redis_data:
    name: jack_site_redis_data
